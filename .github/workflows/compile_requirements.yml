name: Update Dependencies

on:
  push:
    branches:
      - main

  schedule:
    # https://docs.github.com/en/actions/using-workflows/events-that-trigger-workflows
    # In a public repository, scheduled workflows are automatically disabled when no
    # repository activity has occurred in 60 days
    - cron: "5 6 * * 1-5" # At 06:05 on every day-of-week from Monday through Friday

jobs:
  update-dependencies:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Upgrade dependencies and update lockfile
        run: uv lock --upgrade

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "GHA: Update dependencies"
          title: Update dependencies
          body: |
            - Dependency updates

            Auto-generated by [create-pull-request][1]

            [1]: https://github.com/peter-evans/create-pull-request
          branch: update-dependencies
          labels: automated-pr
          delete-branch: true
